<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Participantes - 1</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif}
    
    body{
      min-height:100vh;
      background: url('../Imagenes/tierra5.jpg') no-repeat center center fixed;
      background-size: cover;
      color:#000;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
      background:rgba(255,255,255,0.6);
      padding:8px;
      border-radius:8px
    }
    header img{width:56px;height:56px;border-radius:50%}
    h2{color:#e4007f;text-align:center;margin:16px 0}

    .form{
      max-width:680px;
      margin:0 auto;
      background:rgba(255,255,255,0.82);
      padding:20px;
      border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
    }
    label{display:block;margin:10px 0 6px;font-weight:700}
    select,input[type="text"],input[type="file"]{
      width:100%;
      padding:10px;
      border-radius:6px;
      border:1px solid rgba(0,0,0,0.12)
    }
    .row{margin-bottom:8px}
    button{
      display:block;
      margin:30px auto;
      padding:10px 20px;
      border-radius:8px;
      border:none;
      background:#004d00;
      color:white;
      cursor:pointer
    }
    .small{font-size:0.9rem;color:#000}

    @media (max-width:560px){
      body{padding:12px}
      .form{padding:16px}
      header{gap:10px}
      h2{font-size:1.1rem}
    }
    .btn {
      display: inline-block;
      background: #004d00;
      color: #ffffff;
      padding: 0.8rem 1.5rem;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: background 0.3s ease;
    }
    .btn:hover {
          background: #004d00;
          color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <img src="../Imagenes/tierra2.png" alt="Logo Tierra Huapanguera" />
    <div>
      <h1>TIERRA HUAPANGUERA</h1>
      <div style="font-size:0.9rem">Registro de Participantes</div>
    </div>
  </header>

  <main class="form">
    <h2>REGISTRO DE PARTICIPANTES</h2>
    <h3>XXXV CONCURSO NACIONAL DE BAILE DE HUAPANGO HUASTECO</h3>
    <h4>"LA CUMBRE DEL HUAPANGO"</h4>
    <h3>PINAL DE AMOLRES. QUERETARO.</h3>
    <br><br>
    <form id="part1">
      <label for="categoria">Categoría:</label>
      <select id="categoria" required>
        <option value="" disabled selected>Selecciona una categoría</option>
        <option value="pequeños">Pequeños Huapangueritos</option>
        <option value="infantil">Infantil</option>
        <option value="juvenil">Juvenil</option>
        <option value="adulto">Adulto</option>
      </select>
    
      <label class="small">Estilo:</label>
      <select id="estilo">
        <option value="" disabled selected>Selecciona un estilo</option>
        <option value="hidalguense">Hidalguense</option>
        <option value="potosino">Potosino</option>
        <option value="veracruzano">Veracruzano</option>
        <option value="poblano">Poblano</option>
        <option value="tamaulipeco">Tamaulipeco</option>
        <option value="queretano">Queretano</option>
      </select>
    
      <div class="row">
        <label>Nombre del concursante 1:</label>
        <input type="text" id="nombre1" placeholder="Nombre completo" required>
      </div>
    
      <div class="row">
        <label>Acta de nacimiento:</label>
        <input type="file" id="acta1" accept=".pdf,.jpg,.jpeg,.png" required>
      </div>
    
      <div class="row">
        <label>CURP:</label>
        <input type="file" id="curp1" accept=".pdf,.jpg,.jpeg,.png" required>
      </div>
    
      <div class="row">
        <label>Foto tamaño infantil:</label>
        <input type="file" id="fotoInf1" accept=".jpg,.jpeg,.png" required>
      </div>
    
      <div class="row" id="ineRow1" style="display:none">
        <label>INE (sólo adultos):</label>
        <input type="file" id="ine1" accept=".pdf,.jpg,.jpeg,.png" required>
      </div>
    
      <a href="registro_participante2.html" class="btn">Siguiente</a>
    </form>
  </main>

  <script>
    const categoriaEl = document.getElementById('categoria');
    const ineRow1 = document.getElementById('ineRow1');

    categoriaEl.addEventListener('change', () => {
      const val = categoriaEl.value;
      if (val === 'adulto') {
        ineRow1.style.display = 'block';
      } else {
        ineRow1.style.display = 'none';
      }
    });

    document.getElementById('part1').addEventListener('submit', function(e){
      e.preventDefault();

      const data = {
        categoria: categoriaEl.value,
        estilo: document.getElementById('estilo').value,
        nombre1: document.getElementById('nombre1').value,
        acta1_selected: !!document.getElementById('acta1').files.length,
        curp1_selected: !!document.getElementById('curp1').files.length,
        fotoInf1_selected: !!document.getElementById('fotoInf1').files.length,
        ine1_selected: !!document.getElementById('ine1').files.length
      };
      sessionStorage.setItem('part1', JSON.stringify(data));
      sessionStorage.setItem('part1_isAdult', data.categoria === 'adulto' ? 'true' : 'false');
    });

    const savedPart1 = sessionStorage.getItem('part1');
    if (savedPart1) {
      try {
        const obj = JSON.parse(savedPart1);
        if (obj.categoria) categoriaEl.value = obj.categoria;
        if (obj.estilo) document.getElementById('estilo').value = obj.estilo;
        if (obj.nombre1) document.getElementById('nombre1').value = obj.nombre1;
        if (categoriaEl.value === 'adulto') ineRow1.style.display = 'block';
      } catch (err) { /* ignore */ }
    }
  </script>
</body>
</html>
