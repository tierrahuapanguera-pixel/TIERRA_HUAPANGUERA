  <title>Convocatorias de Concursos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('Imagenes/concurso9.jpg') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
      color: #fff;
    }

    header {
      background: rgba(178, 34, 34, 0.8);
      color: white;
      text-align: center;
      padding: 1.5rem;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    section {
      background: rgba(0, 0, 0, 0.7);
      padding: 2rem;
      max-width: 800px;
      margin: 2rem auto;
      border-radius: 10px;
    }

    h2 {
      color: #ffd700;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255,255,255,0.9);
      color: #000;
      margin: 10px 0;
      padding: 15px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    li:hover {
      background: #ffd700;
      color: #000;
    }

    a {
      text-decoration: none;
      color: inherit;
      display: block;
    }
  </style>
