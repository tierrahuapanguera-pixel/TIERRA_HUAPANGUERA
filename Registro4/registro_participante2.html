<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Participantes - 2</title>
  <style>
    :root{
      --bg-overlay: rgba(255,255,255,0.92);
      --accent: #e4007f;
      --primary: #004d00;
      --muted: #333;
      --radius: 12px;
      --gap: 14px;
      --max-width: 920px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter, system-ui, Arial, sans-serif}
    html,body{height:100%}

    body{
      min-height:100vh;
      background: url('../Imagenes/tierra5.jpg') no-repeat center center fixed;
      background-size: cover;
      color:var(--muted);
      padding:20px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .page{
      width:100%;
      max-width:var(--max-width);
      display:flex;
      flex-direction:column;
      gap:var(--gap);
      padding:18px;
      background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.55));
      border-radius:var(--radius);
      box-shadow:0 10px 30px rgba(0,0,0,0.18);
      backdrop-filter: blur(4px);
    }

    header{
      display:flex;
      gap:12px;
      align-items:center;
      padding:10px;
      border-radius:10px;
      background:rgba(255,255,255,0.6);
    }

    header img{
      width:64px;
      height:64px;
      border-radius:50%;
      object-fit:cover;
      flex:0 0 64px;
    }

    header .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    header h1{
      font-size:1.05rem;
      color:var(--primary);
      letter-spacing:0.6px;
    }

    header .subtitle{
      font-size:0.9rem;
      color:var(--muted);
    }

    main{
      padding:12px;
      background:var(--bg-overlay);
      border-radius:10px;
    }

    .title{
      text-align:center;
      color:var(--accent);
      margin-bottom:6px;
      font-weight:800;
    }

    .subtitle-main{
      text-align:center;
      font-size:0.95rem;
      color:var(--muted);
      margin-bottom:12px;
    }

    form{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      align-items:start;
      max-width:100%;
    }

    label{display:block;font-weight:700;margin-bottom:6px;color:var(--muted)}
    .full{grid-column:1 / -1}
    .row{display:flex;flex-direction:column;gap:6px}

    select,input[type="text"],input[type="file"]{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid rgba(0,0,0,0.12);
      background:#fff;
      font-size:0.95rem;
    }

    input[type="file"]{padding:8px 10px}

    .hint{font-size:0.85rem;color:#444;margin-top:4px}

    .actions{
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
      margin-top:18px;
      grid-column:1 / -1;
    }

    .btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:var(--primary);
      color:#fff;
      padding:10px 18px;
      border-radius:8px;
      text-decoration:none;
      border:none;
      cursor:pointer;
      font-weight:700;
    }

    .btn.secondary{
      background:transparent;
      color:var(--primary);
      border:2px solid rgba(0,77,0,0.12);
    }

    /* Responsive adjustments */
    @media (max-width: 880px){
      form{grid-template-columns:1fr;}
      header img{width:56px;height:56px;flex:0 0 56px}
      .page{padding:14px}
    }

    @media (max-width: 520px){
      body{padding:12px}
      .page{padding:12px}
      header{gap:10px}
      .title{font-size:1rem}
      .subtitle-main{font-size:0.9rem}
      select,input[type="text"],input[type="file"]{font-size:0.95rem;padding:9px}
      .btn{padding:10px 14px;font-size:0.95rem}
    }

    /* Small visual helpers */
    .required::after{content:" *";color:#c0392b;font-weight:700;margin-left:4px;font-size:0.95rem}
    .hidden{display:none !important}

    /* Optional: make file inputs friendlier on small screens */
    input[type="file"]::-webkit-file-upload-button{padding:8px;border-radius:6px;background:#f2f2f2;border:none}
  </style>
</head>
<body>
  <div class="page" role="main">
    <header>
      <img src="../Imagenes/tierra2.png" alt="Logo Tierra Huapanguera" />
      <div class="brand">
        <h1>TIERRA HUAPANGUERA</h1>
        <div class="subtitle">Registro de Participantes - Integrantes</div>
      </div>
    </header>

    <main>
      <div class="title">REGISTRO DE PARTICIPANTES (2)</div>

      <form id="part2" novalidate>
        <div class="row full">
          <label for="nombre2" class="required">Nombre del concursante 2</label>
          <input type="text" id="nombre2" placeholder="Nombre completo" required>
        </div>

        <div class="row">
          <label for="acta2" class="required">Acta de nacimiento</label>
          <input type="file" id="acta2" accept=".pdf,.jpg,.jpeg,.png" required>
          <div class="hint">Aceptado: PDF, JPG, PNG</div>
        </div>

        <div class="row">
          <label for="curp2" class="required">CURP</label>
          <input type="file" id="curp2" accept=".pdf,.jpg,.jpeg,.png" required>
        </div>

        <div class="row">
          <label for="fotoInf2" class="required">Foto tamaño infantil</label>
          <input type="file" id="fotoInf2" accept=".jpg,.jpeg,.png" required>
        </div>

        <div class="row hidden" id="ineRow2">
          <label for="ine2" class="required">INE (sólo adultos)</label>
          <input type="file" id="ine2" accept=".pdf,.jpg,.jpeg,.png">
        </div>

        <div class="actions full">
          <button type="button" id="backBtn" class="btn secondary">Volver</button>
          <button type="submit" class="btn" id="finalizar">Finalizar Registro</button>
        </div>
      </form>
    </main>
  </div>

  <script>
    (function(){
      const ineRow2 = document.getElementById('ineRow2');
      const ineInput = document.getElementById('ine2');
      const isAdult = sessionStorage.getItem('part1_isAdult') === 'true';
      const form = document.getElementById('part2');
      const backBtn = document.getElementById('backBtn');

      // Mostrar INE si la página anterior indicó adulto
      function initIne(){
        if (isAdult) {
          ineRow2.classList.remove('hidden');
          ineInput.setAttribute('required','required');
        } else {
          ineRow2.classList.add('hidden');
          ineInput.removeAttribute('required');
        }
      }
      initIne();

      // Restaurar datos guardados (si existen)
      (function restore(){
        const saved2 = sessionStorage.getItem('part2');
        if (!saved2) return;
        try {
          const obj = JSON.parse(saved2);
          if (obj.nombre2) document.getElementById('nombre2').value = obj.nombre2;
          // No restauramos archivos por seguridad; solo marcadores
        } catch(e){}
      })();

      // Volver: si hay historial, volver; si no, ir a la página 1
      backBtn.addEventListener('click', function(){
        if (document.referrer) history.back();
        else window.location.href = 'registro_participante1.html';
      });

      // Guardar y asignar número de pareja al enviar
      form.addEventListener('submit', function(e){
        e.preventDefault();

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        const data2 = {
          nombre2: document.getElementById('nombre2').value.trim(),
          acta2_selected: !!document.getElementById('acta2').files.length,
          curp2_selected: !!document.getElementById('curp2').files.length,
          fotoInf2_selected: !!document.getElementById('fotoInf2').files.length,
          ine2_selected: !!ineInput.files.length
        };
        sessionStorage.setItem('part2', JSON.stringify(data2));

        // Generar número de pareja y guardar en localStorage
        let parejaCount = localStorage.getItem('parejaCount');
        if (!parejaCount) {
          parejaCount = 1;
        } else {
          parejaCount = parseInt(parejaCount, 10) + 1;
        }
        localStorage.setItem('parejaCount', parejaCount);

        // Opcional: guardar resumen de pareja en localStorage (sin archivos)
        const parejas = JSON.parse(localStorage.getItem('parejas_registradas') || '[]');
        parejas.push({
          numero: parejaCount,
          nombre1: (JSON.parse(sessionStorage.getItem('part1') || '{}')).nombre1 || '',
          nombre2: data2.nombre2 || '',
          categoria: (JSON.parse(sessionStorage.getItem('part1') || '{}')).categoria || ''
        });
        localStorage.setItem('parejas_registradas', JSON.stringify(parejas));

        // Redirigir a la página de número de pareja o mostrar confirmación
        window.location.href = '../Num_Pareja.html';
      });
    })();
  </script>
</body>
</html>
