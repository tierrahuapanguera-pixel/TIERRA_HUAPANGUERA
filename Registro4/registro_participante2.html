<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Participantes - 2</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif}
   
    body{
      min-height:100vh;
      background: url('../Imagenes/tierra5.jpg') no-repeat center center fixed;
      background-size: cover;
      color:#000;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
      background:rgba(255,255,255,0.72);
      padding:8px;
      border-radius:8px;
    }
    header img{width:56px;height:56px;border-radius:50%}
    h2{color:#e4007f;text-align:center;margin:16px 0}

    .form{
      max-width:680px;
      margin:0 auto;
      background:rgba(255,255,255,0.88);
      padding:20px;
      border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,0.22);
      backdrop-filter: blur(4px);
    }

    label{display:block;margin:10px 0 6px;font-weight:700}
    input[type="text"],input[type="file"]{
      width:100%;
      padding:10px;
      border-radius:6px;
      border:1px solid rgba(0,0,0,0.12);
      background:transparent;
    }
    .row{margin-bottom:8px}
    .btn {
      display:block;
      margin:30px auto;
      padding:10px 20px;
      border-radius:8px;
      background:#004d00;
      color:white;
      text-align:center;
      text-decoration:none;
      font-weight:bold;
      cursor:pointer;
    }
    .btn:hover {
      background:#006600;
    }

    @media (max-width:560px){
      body{padding:12px}
      .form{padding:16px}
      header{gap:10px}
      h2{font-size:1.1rem}
    }
  </style>
</head>
<body>
  <header>
    <img src="../Imagenes/tierra2.png" alt="Logo Tierra Huapanguera" />
    <div>
      <h1>TIERRA HUAPANGUERA</h1>
      <div style="font-size:0.9rem">Registro de Participantes - Integrantes</div>
    </div>
  </header>

  <main class="form">
    <h2>REGISTRO DE PARTICIPANTES (2)</h2>

    <form id="part2">
      <div class="row">
        <label>Nombre del concursante 2:</label>
        <input type="text" id="nombre2" placeholder="Nombre completo" required>
      </div>

      <div class="row">
        <label>Acta de nacimiento:</label>
        <input type="file" id="acta2" accept=".pdf,.jpg,.jpeg,.png" required>
      </div>

      <div class="row">
        <label>CURP:</label>
        <input type="file" id="curp2" accept=".pdf,.jpg,.jpeg,.png" required>
      </div>

      <div class="row">
        <label>Foto tamaño infantil:</label>
        <input type="file" id="fotoInf2" accept=".jpg,.jpeg,.png" required>
      </div>

      <div class="row" id="ineRow2" style="display:none">
        <label>INE (sólo adultos):</label>
        <input type="file" id="ine2" accept=".pdf,.jpg,.jpeg,.png" required>
      </div>

      <!-- Enlace en lugar de botón -->
      <a href="../Num_Pareja.html" class="btn" id="finalizar">Finalizar Registro</a>
    </form>
  </main>

  <script>
    const ineRow2 = document.getElementById('ineRow2');
    const isAdult = sessionStorage.getItem('part1_isAdult') === 'true';
    if (isAdult) {
      ineRow2.style.display = 'block';
    }

    // Guardar datos y asignar número de pareja al hacer clic en el enlace
    document.getElementById('finalizar').addEventListener('click', function(){
      const data2 = {
        nombre2: document.getElementById('nombre2').value,
        acta2_selected: !!document.getElementById('acta2').files.length,
        curp2_selected: !!document.getElementById('curp2').files.length,
        fotoInf2_selected: !!document.getElementById('fotoInf2').files.length,
        ine2_selected: !!document.getElementById('ine2').files.length
      };
      sessionStorage.setItem('part2', JSON.stringify(data2));

      // Generar número de pareja
      let parejaCount = localStorage.getItem('parejaCount');
      if (!parejaCount) {
        parejaCount = 1;
      } else {
        parejaCount = parseInt(parejaCount) + 1;
      }
      localStorage.setItem('parejaCount', parejaCount);
    });

    // Recuperar datos si ya existen
    const saved2 = sessionStorage.getItem('part2');
    if (saved2) {
      try {
        const obj = JSON.parse(saved2);
        if (obj.nombre2) document.getElementById('nombre2').value = obj.nombre2;
      } catch(e){}
    }
  </script>
</body>
</html>
