<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Número de Pareja</title>
  <style>
    :root{
      --bg-img: url('../Imagenes/tierra5.jpg');
      --card-bg: rgba(255,255,255,0.95);
      --accent: #e4007f;
      --accent-dark: #004d00;
      --muted: #333;
      --radius: 14px;
      --gap: 16px;
      --max-width: 520px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}

    body{
      font-family: Inter, system-ui, Arial, sans-serif;
      background-image: var(--bg-img);
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      color: var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .backdrop{
      width:100%;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.28), rgba(0,0,0,0.28));
    }

    .card{
      width:100%;
      max-width:var(--max-width);
      background:var(--card-bg);
      border-radius:var(--radius);
      padding:28px;
      box-shadow:0 12px 36px rgba(0,0,0,0.28);
      text-align:center;
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:center;
    }

    h1{
      color:var(--accent-dark);
      font-size:1.45rem;
      margin-bottom:4px;
    }

    p{ color:#222; font-size:1rem; margin:0; }

    .numero{
      display:inline-block;
      background:linear-gradient(90deg, rgba(228,0,127,0.08), rgba(0,77,0,0.04));
      color:var(--accent);
      font-size:2.25rem;
      font-weight:800;
      padding:14px 22px;
      border-radius:10px;
      border:2px dashed rgba(228,0,127,0.12);
      min-width:140px;
      text-align:center;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
    }

    .meta{
      font-size:0.95rem;
      color:#444;
    }

    .actions{
      display:flex;
      gap:10px;
      width:100%;
      justify-content:center;
      margin-top:6px;
      flex-wrap:wrap;
    }

    .btn{
      background:var(--accent-dark);
      color:#fff;
      border:none;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:120px;
    }

    .btn.secondary{
      background:transparent;
      color:var(--accent-dark);
      border:2px solid rgba(0,77,0,0.12);
    }

    .note{
      font-size:0.85rem;
      color:#666;
      margin-top:6px;
    }

    @media (max-width: 720px){
      .card{ padding:20px; }
      .numero{ font-size:1.9rem; padding:12px 18px; min-width:120px; }
      h1{ font-size:1.25rem; }
    }

    @media (max-width: 420px){
      .card{ padding:16px; border-radius:12px; }
      .numero{ font-size:1.6rem; padding:10px 14px; min-width:100px; }
      .btn{ min-width:100px; padding:10px 12px; font-size:0.95rem; }
    }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; }
    }
  </style>
</head>
<body>
  <div class="backdrop" role="main">
    <div class="card" role="region" aria-labelledby="title">
      <h1 id="title">¡Registro completado!</h1>
      <p class="meta">El número asignado a tu pareja es:</p>

      <div class="numero" id="numPareja" aria-live="polite">—</div>

      <div class="note" id="noteText"></div>

      <div class="actions" role="group" aria-label="Acciones">
        <!--  BOTÓN MODIFICADO -->
        <button class="btn" id="finalizar">Finalizar</button>

        <button class="btn secondary" id="nuevaPareja">Registrar otra pareja</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const numEl = document.getElementById('numPareja');
      const noteEl = document.getElementById('noteText');

      let parejaCount = localStorage.getItem('parejaCount');

      if (!parejaCount) {
        numEl.textContent = 'N/A';
        noteEl.textContent = 'No se encontró un número asignado. Completa el registro para obtener un número de pareja.';
      } else {
        parejaCount = parseInt(parejaCount, 10);
        numEl.textContent = parejaCount;
        noteEl.textContent = 'Guarda este número para cualquier consulta o reclamo.';
      }

      //  NUEVA FUNCIÓN FINALIZAR
      document.getElementById('finalizar').addEventListener('click', function(){
        window.location.href = 'concursos.html';
      });

      document.getElementById('nuevaPareja').addEventListener('click', function(){
        window.location.href = 'Registro1/registro_participante1.html';
      });

      numEl.addEventListener('click', function(){
        const text = numEl.textContent;
        if (!text || text === 'N/A') return;
        navigator.clipboard?.writeText(text).then(()=>{
          const prev = noteEl.textContent;
          noteEl.textContent = 'Número copiado al portapapeles.';
          setTimeout(()=> noteEl.textContent = prev, 1800);
        }).catch(()=>{});
      });

      //  CAMBIAMOS EL FOCUS AL NUEVO BOTÓN
      document.getElementById('finalizar').focus();
    })();
  </script>
</body>
</html>
