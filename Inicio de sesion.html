<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('Imagenes/concurso10.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      width: 300px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #b22222;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: bold;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      background: #ffd700;
      color: #000;
      padding: 0.8rem 1.5rem;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #ffa500;
      color: #fff;
    }

    .error {
      color: red;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Registro</h2>
    <form id="loginForm">
      <label for="email">Correo electrónico:</label>
      <input type="text" id="email" placeholder="ejemplo@correo.com" required>
      <div id="emailError" class="error"></div>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
      <div id="passwordError" class="error"></div>

      <button type="submit" class="btn">Ingresar</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      let valid = true;

      // Validación de correo
      const emailValue = emailInput.value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(emailValue)) {
        emailError.textContent = "Por favor ingresa un correo válido.";
        valid = false;
      } else {
        emailError.textContent = "";
      }

      // Validación de contraseña (mínimo 8 caracteres, al menos una letra y un número)
      const passwordValue = passwordInput.value.trim();
      const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
      if (!passwordRegex.test(passwordValue)) {
        passwordError.textContent = "La contraseña debe tener mínimo 8 caracteres, incluir letras y números.";
        valid = false;
      } else {
        passwordError.textContent = "";
      }

      if (valid) {
        alert("Inicio de sesión exitoso con el correo: " + emailValue);
        // Redirigir a concursos.html
        window.location.href = "concursos.html";
      }
    });
  </script>
</body>
</html>
