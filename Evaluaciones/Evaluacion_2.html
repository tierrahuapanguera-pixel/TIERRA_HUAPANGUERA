<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Evaluación de Parejas</title>

  <style>
    :root{
      --card-bg: rgba(255,255,255,0.92);
      --accent: #e4007f;
      --primary: #004d00;
      --muted: #555;
      --radius: 10px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,Arial,sans-serif}

    body{
      min-height:100vh;
      background:url('../Imagenes/concurso9.jpg') no-repeat center center fixed;
      background-size:cover;
      padding:24px;
      display:flex;
      justify-content:center;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 380px;
      gap:20px;
    }

    .card{
      background:var(--card-bg);
      padding:18px;
      border-radius:var(--radius);
      box-shadow:0 6px 20px rgba(0,0,0,0.15);
    }

    h2,h3{color:var(--accent); margin-bottom:10px;}

    input,select{
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid rgba(0,0,0,0.08);
      margin-bottom:12px;
      font-size:0.95rem;
    }

    input:focus, select:focus{
      outline:none;
      border-color:var(--accent);
    }

    button{
      padding:10px 14px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:700;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-ghost{
      background:transparent;
      border:1px solid rgba(0,0,0,0.1);
    }

    .table-container{
      width:100%;
      overflow-x:auto;
      margin-top:10px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:800px;
    }

    th,td{
      padding:8px;
      border-bottom:1px solid rgba(0,0,0,0.06);
      text-align:left;
      font-size:0.95rem;
      white-space:nowrap;
    }

    th{
      color:var(--muted);
      font-weight:700;
    }

    tbody tr:hover{
      background:rgba(0,0,0,0.03);
    }
  </style>
</head>

<body>
<div class="container">

  <!-- FORM -->
  <div class="card">
    <h2>Registrar Evaluaciones</h2>

    <form id="form">
      <input type="text" id="juez" placeholder="Nombre del jurado" required>
      <input type="text" id="num" placeholder="Número de pareja" required>

      <select id="cat">
        <option value="">Selecciona categoría</option>
        <option>Infantil</option>
        <option>Juvenil</option>
        <option>Adulto</option>
      </select>

      <input type="number" id="v" placeholder="Vestuario (0-10)">
      <input type="number" id="r" placeholder="Ritmo (0-10)">
      <input type="number" id="p" placeholder="Precisión (0-10)">
      <input type="number" id="c" placeholder="Categoría (0-10)">
      <input type="number" id="pro" placeholder="Proyección (0-10)">

      <button class="btn-primary">Guardar</button>
    </form>
  </div>

  <!-- TABLAS -->
  <div class="card">

    <h3>Evaluaciones</h3>
    <button id="clearEval" class="btn-ghost">Borrar Evaluaciones</button>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Pareja</th>
            <th>Jurado</th>
            <th>Categoría</th>
            <th>Vestuario</th>
            <th>Ritmo</th>
            <th>Precisión</th>
            <th>Cat.</th>
            <th>Proyección</th>
            <th>Total</th>
            <th>Promedio</th>
          </tr>
        </thead>
        <tbody id="tablaEval"></tbody>
      </table>
    </div>

    <h3 style="margin-top:20px;">Parejas Registradas</h3>
    <button id="clearParejas" class="btn-ghost">Borrar Parejas</button>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Número</th>
          </tr>
        </thead>
        <tbody id="tablaParejas"></tbody>
      </table>
    </div>

  </div>

</div>

<script>
const STORAGE_EVAL = "evaluaciones";
const STORAGE_PAREJAS = "parejas_registradas";

const tablaEval = document.getElementById("tablaEval");
const tablaParejas = document.getElementById("tablaParejas");

const v = document.getElementById("v");
const r = document.getElementById("r");
const p = document.getElementById("p");
const c = document.getElementById("c");
const pro = document.getElementById("pro");

// RENDER
function renderEval(){
  let data = JSON.parse(localStorage.getItem(STORAGE_EVAL)) || [];
  tablaEval.innerHTML = "";

  if(data.length === 0){
    tablaEval.innerHTML = "<tr><td colspan='10'>Sin evaluaciones</td></tr>";
    return;
  }

  data.forEach(e=>{
    let tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${e.num}</td>
      <td>${e.juez}</td>
      <td>${e.categoria}</td>
      <td>${e.vestuario}</td>
      <td>${e.ritmo}</td>
      <td>${e.precision}</td>
      <td>${e.categoriaScore}</td>
      <td>${e.proyeccion}</td>
      <td>${e.total.toFixed(1)}</td>
      <td>${(e.promedio ?? 0).toFixed(1)}</td>
    `;
    tablaEval.appendChild(tr);
  });
}

function renderParejas(){
  let data = JSON.parse(localStorage.getItem(STORAGE_PAREJAS)) || [];
  tablaParejas.innerHTML = "";

  if(data.length === 0){
    tablaParejas.innerHTML = "<tr><td>Sin parejas registradas</td></tr>";
    return;
  }

  data.forEach(p=>{
    let tr = document.createElement("tr");
    tr.innerHTML = `<td>${p.numero}</td>`;
    tablaParejas.appendChild(tr);
  });
}

// GUARDAR
document.getElementById("form").addEventListener("submit", e=>{
  e.preventDefault();

  const juez = document.getElementById("juez").value.trim();
  const numPareja = document.getElementById("num").value.trim();

  const vestuario = parseFloat(v.value);
  const ritmo = parseFloat(r.value);
  const precision = parseFloat(p.value);
  const categoriaScore = parseFloat(c.value);
  const proyeccion = parseFloat(pro.value);

  if(!juez || !numPareja){
    alert("Completa nombre del jurado y número de pareja");
    return;
  }

  if([vestuario, ritmo, precision, categoriaScore, proyeccion].some(val => isNaN(val))){
    alert("Debes llenar todas las calificaciones");
    return;
  }

  const valores = [vestuario, ritmo, precision, categoriaScore, proyeccion];

  for(let val of valores){
    if(val < 0 || val > 10){
      alert("Las calificaciones deben estar entre 0 y 10");
      return;
    }
  }

  const total = valores.reduce((a,b)=>a+b,0);
  const promedio = total / valores.length;

  let data = JSON.parse(localStorage.getItem(STORAGE_EVAL)) || [];

  data.push({
    num: numPareja,
    juez,
    categoria: document.getElementById("cat").value,
    vestuario,
    ritmo,
    precision,
    categoriaScore,
    proyeccion,
    total,
    promedio
  });

  localStorage.setItem(STORAGE_EVAL, JSON.stringify(data));

  renderEval();

  e.target.reset();
  document.getElementById("juez").focus();
});

// BORRAR
document.getElementById("clearEval").onclick = ()=>{
  localStorage.removeItem(STORAGE_EVAL);
  renderEval();
};

document.getElementById("clearParejas").onclick = ()=>{
  localStorage.removeItem(STORAGE_PAREJAS);
  renderParejas();
};

// INIT
renderEval();
renderParejas();
</script>

</body>
</html>
