<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Evaluación de Parejas</title>

  <style>
    :root{
      --card-bg: rgba(255,255,255,0.94);
      --accent: #e4007f;
      --primary: #004d00;
      --muted: #555;
      --radius: 10px;
      --gap: 20px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
    body{
      min-height:100vh;
      background:url('../Imagenes/concurso9.jpg') no-repeat center center fixed;
      background-size:cover;
      padding:24px;
      display:flex;
      justify-content:center;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 380px;
      gap:20px;
    }

    .card{
      background:var(--card-bg);
      padding:18px;
      border-radius:10px;
      box-shadow:0 6px 20px rgba(0,0,0,0.15);
    }

    h2,h3{color:var(--accent); margin-bottom:10px}

    input,select,button{
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{cursor:pointer;font-weight:bold}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-ghost{background:#eee}

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th,td{
      padding:6px;
      border-bottom:1px solid #ddd;
    }

    .gold{background:#fff3b0;}
    .silver{background:#e0e0e0;}
    .bronze{background:#f5c6a5;}
  </style>
</head>

<body>
<div class="container">

  <!-- FORM -->
  <div class="card">
    <h2>Registrar Evaluaciones</h2>

    <form id="form">
      <input type="text" id="juez" placeholder="Nombre del jurado" required>
      <input type="text" id="num" placeholder="Número de pareja" required>

      <select id="cat" required>
        <option value="">Selecciona categoría</option>
        <option>Pequeños Huapangueritos</option>
        <option>Infantil</option>
        <option>Juvenil</option>
        <option>Adulto</option>
      </select>

      <input type="number" id="v" placeholder="Vestuario" required>
      <input type="number" id="r" placeholder="Ritmo" required>
      <input type="number" id="p" placeholder="Precisión" required>
      <input type="number" id="c" placeholder="Categoría" required>
      <input type="number" id="pro" placeholder="Proyección" required>

      <button class="btn-primary" type="submit">Guardar</button>
    </form>
  </div>

  <!-- TABLAS -->
  <div class="card">

    <h3>Evaluaciones</h3>
    <button onclick="clearEval()" class="btn-ghost">Borrar Evaluaciones</button>

    <table>
      <thead>
        <tr>
          <th>Pareja</th>
          <th>Jurado</th>
          <th>Categoría</th>
          <th>Total</th>
          <th>Promedio</th>
        </tr>
      </thead>
      <tbody id="tablaEval"></tbody>
    </table>

    <h3>Parejas Registradas</h3>
    <button onclick="clearParejas()" class="btn-ghost">Borrar Parejas</button>

    <table>
      <thead>
        <tr>
          <th>Número</th>
          <th>Categoría</th>
        </tr>
      </thead>
      <tbody id="tablaParejas"></tbody>
    </table>

    <h3> Ranking Top 3 por Categoría</h3>
    <table>
      <thead>
        <tr>
          <th>Categoría</th>
          <th>Posición</th>
          <th>Pareja</th>
          <th>Promedio</th>
        </tr>
      </thead>
      <tbody id="tablaRanking"></tbody>
    </table>

  </div>

</div>

<script>
const STORAGE_EVAL = "evaluaciones";
const STORAGE_PAREJAS = "parejas_registradas"; // ✅ corregido

// GUARDAR
document.getElementById("form").addEventListener("submit", e=>{
  e.preventDefault();

  let juez = document.getElementById("juez").value.trim();
  let num = document.getElementById("num").value.trim();
  let cat = document.getElementById("cat").value;

  let v = parseFloat(document.getElementById("v").value);
  let r = parseFloat(document.getElementById("r").value);
  let p = parseFloat(document.getElementById("p").value);
  let c = parseFloat(document.getElementById("c").value);
  let pro = parseFloat(document.getElementById("pro").value);

  let evals = JSON.parse(localStorage.getItem(STORAGE_EVAL)) || [];

  // 🚫 VALIDACIÓN: evitar duplicados
  let existe = evals.some(e => 
    e.juez.toLowerCase() === juez.toLowerCase() &&
    e.num === num
  );

  if(existe){
    alert("⚠️ Este jurado ya calificó a esta pareja");
    return;
  }

  let total = v+r+p+c+pro;
  let promedio = total/5;

  evals.push({juez,num,categoria:cat,total,promedio});
  localStorage.setItem(STORAGE_EVAL, JSON.stringify(evals));

  // GUARDAR PAREJA
  let parejas = JSON.parse(localStorage.getItem(STORAGE_PAREJAS)) || [];

  if(!parejas.some(p => p.numero === num)){
    parejas.push({
      numero: num,
      categoria: cat || "Sin categoría"
    });
    localStorage.setItem(STORAGE_PAREJAS, JSON.stringify(parejas));
  }

  e.target.reset();
  renderAll();
});

// RENDER
function renderAll(){
  renderEval();
  renderParejas();
  renderRanking();
}

// TABLA EVAL
function renderEval(){
  let data = JSON.parse(localStorage.getItem(STORAGE_EVAL)) || [];
  let tabla = document.getElementById("tablaEval");
  tabla.innerHTML="";

  data.forEach(e=>{
    tabla.innerHTML += `
      <tr>
        <td>${e.num}</td>
        <td>${e.juez}</td>
        <td>${e.categoria}</td>
        <td>${e.total.toFixed(1)}</td>
        <td>${e.promedio.toFixed(1)}</td>
      </tr>
    `;
  });
}

// TABLA PAREJAS
function renderParejas(){
  let data = JSON.parse(localStorage.getItem(STORAGE_PAREJAS)) || [];
  let tabla = document.getElementById("tablaParejas");
  tabla.innerHTML="";

  data.forEach(p=>{
    tabla.innerHTML += `
      <tr>
        <td>${p.numero}</td>
        <td>${p.categoria}</td>
      </tr>
    `;
  });
}

// RANKING
function renderRanking(){
  const data = JSON.parse(localStorage.getItem(STORAGE_EVAL)) || [];
  const tabla = document.getElementById("tablaRanking");
  tabla.innerHTML = "";

  let grupos = {};

  data.forEach(e=>{
    let key = e.categoria + "_" + e.num;

    if(!grupos[key]){
      grupos[key] = {categoria:e.categoria,num:e.num,total:0,count:0};
    }

    grupos[key].total += e.promedio;
    grupos[key].count++;
  });

  let resultados = Object.values(grupos).map(g=>({
    categoria:g.categoria,
    num:g.num,
    promedio:g.total/g.count
  }));

  let porCategoria = {};

  resultados.forEach(r=>{
    if(!porCategoria[r.categoria]){
      porCategoria[r.categoria]=[];
    }
    porCategoria[r.categoria].push(r);
  });

  Object.keys(porCategoria).forEach(cat=>{
    let top = porCategoria[cat]
      .sort((a,b)=>b.promedio-a.promedio)
      .slice(0,3);

    top.forEach((t,i)=>{
      let clase = i===0?"gold":i===1?"silver":"bronze";

      tabla.innerHTML += `
        <tr class="${clase}">
          <td>${cat}</td>
          <td>${i+1}</td>
          <td>${t.num}</td>
          <td>${t.promedio.toFixed(2)}</td>
        </tr>
      `;
    });
  });
}

// BORRAR
function clearEval(){
  localStorage.removeItem(STORAGE_EVAL);
  renderAll();
}

function clearParejas(){
  localStorage.removeItem(STORAGE_PAREJAS);
  renderAll();
}

// INIT
renderAll();
</script>

</body>
</html>
