<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Evaluación de Parejas</title>

  <style>
    :root{
      --card-bg: rgba(255,255,255,0.94);
      --accent: #e4007f;
      --primary: #004d00;
      --muted: #555;
      --radius: 10px;
      --gap: 20px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,Arial,sans-serif}
    html,body{height:100%}
    body{
      min-height:100vh;
      background:url('../Imagenes/concurso9.jpg') no-repeat center center fixed;
      background-size:cover;
      padding:24px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      color:#222;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 380px;
      gap:var(--gap);
      align-items:start;
    }

    .card{
      background:var(--card-bg);
      padding:18px;
      border-radius:var(--radius);
      box-shadow:0 6px 20px rgba(0,0,0,0.15);
    }

    h2,h3{color:var(--accent); margin-bottom:10px; font-weight:700}

    form{display:flex; flex-direction:column}
    input,select,button{
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid rgba(0,0,0,0.08);
      margin-bottom:12px;
      font-size:0.95rem;
      background:#fff;
    }

    button{
      padding:10px 14px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:700;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-ghost{
      background:transparent;
      border:1px solid rgba(0,0,0,0.1);
      color:inherit;
    }

    .table-container{
      width:100%;
      overflow-x:auto;
      margin-top:10px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:800px;
    }

    th,td{
      padding:8px;
      border-bottom:1px solid rgba(0,0,0,0.06);
      text-align:left;
      font-size:0.95rem;
    }

    th{
      color:var(--muted);
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      margin-bottom:10px;
    }

  </style>
</head>

<body>
<div class="container">

  <!-- FORM -->
  <div class="card">
    <h2>Registrar Evaluaciones</h2>

    <form id="form">
      <input type="text" id="juez" placeholder="Nombre del jurado" required>
      <input type="text" id="num" placeholder="Número de pareja" required>

      <select id="cat" required>
        <option value="">Selecciona categoría</option>
        <option>Pequeños Huapangueritos</option>
        <option>Infantil</option>
        <option>Juvenil</option>
        <option>Adulto</option>
      </select>

      <input type="number" id="v" placeholder="Vestuario" required>
      <input type="number" id="r" placeholder="Ritmo" required>
      <input type="number" id="p" placeholder="Precisión" required>
      <input type="number" id="c" placeholder="Categoría" required>
      <input type="number" id="pro" placeholder="Proyección" required>

      <button class="btn-primary" type="submit">Guardar</button>
    </form>
  </div>

  <!-- TABLAS -->
  <div class="card">

    <h3>Evaluaciones</h3>
    <button id="clearEval" class="btn-ghost">Borrar Evaluaciones</button>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Pareja</th>
            <th>Jurado</th>
            <th>Categoría</th>
            <th>Vestuario</th>
            <th>Ritmo</th>
            <th>Precisión</th>
            <th>Cat.</th>
            <th>Proyección</th>
            <th>Total</th>
            <th>Promedio</th>
          </tr>
        </thead>
        <tbody id="tablaEval"></tbody>
      </table>
    </div>

    <h3 style="margin-top:20px;">Parejas Registradas</h3>
    <button id="clearParejas" class="btn-ghost">Borrar Parejas</button>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Número</th>
            <th>Categoría</th>
          </tr>
        </thead>
        <tbody id="tablaParejas"></tbody>
      </table>
    </div>
    <br>
    <br>
    
    <!-- BOTÓN DE DOCUMENTOS -->
    <div class="top-actions">
      <button class="btn-primary" onclick="window.location.href='../Documentos.html'">
        Documentos
      </button>
    </div>

  </div>

</div>

<script>
const STORAGE_EVAL = "evaluaciones";
const STORAGE_PAREJAS = "parejas_registradas";

const tablaEval = document.getElementById("tablaEval");
const tablaParejas = document.getElementById("tablaParejas");

function renderEval(){
  let data = JSON.parse(localStorage.getItem(STORAGE_EVAL)) || [];
  tablaEval.innerHTML = "";

  data.forEach(e=>{
    let tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${e.num}</td>
      <td>${e.juez}</td>
      <td>${e.categoria}</td>
      <td>${e.vestuario}</td>
      <td>${e.ritmo}</td>
      <td>${e.precision}</td>
      <td>${e.categoriaScore}</td>
      <td>${e.proyeccion}</td>
      <td>${e.total.toFixed(1)}</td>
      <td>${e.promedio.toFixed(1)}</td>
    `;
    tablaEval.appendChild(tr);
  });
}

function renderParejas(){
  let data = JSON.parse(localStorage.getItem(STORAGE_PAREJAS)) || [];
  tablaParejas.innerHTML = "";

  data.forEach(p=>{
    let tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.numero}</td>
      <td>${p.categoria || "Sin categoría"}</td>
    `;
    tablaParejas.appendChild(tr);
  });
}

renderEval();
renderParejas();
</script>

</body>
</html>
